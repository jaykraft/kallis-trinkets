<nav
  class="bg-cream/95 backdrop-blur-sm border-b border-sand shadow-sm"
  aria-label="Main navigation"
>
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Logo + Brand -->
      <a
        href="/"
        class="flex items-center"
        aria-label="Kalli's Trinkets & More — return to top"
        class="flex items-center gap-3 group"
      >
        <img
          ngSrc="assets/images/logo.svg"
          width="40"
          height="40"
          alt=""
          priority
          disableOptimizedSrcset
          class="rounded-full border-2 border-sand object-cover"
        />
        <span class="font-serif text-base font-semibold text-brown group-hover:text-terracotta-dark transition-colors">
          Kalli's Trinkets <span class="text-terracotta">&amp;</span> More
        </span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-5">
        @for (link of navLinks; track link.sectionId) {
          <a
            [href]="'#' + link.sectionId"
            (click)="scrollTo(link.sectionId, $event)"
            class="text-brown-light hover:text-brown text-sm font-medium pb-0.5 border-b-2 border-transparent hover:border-terracotta transition-all duration-200"
          >
            {{ link.label }}
          </a>
        }
        <a
          href="#inquiry"
          (click)="scrollTo('inquiry', $event)"
          class="bg-brown text-cream px-5 py-2 rounded-full text-sm font-bold hover:bg-brown-light transition-colors shadow-sm"
        >
          Place an Order
        </a>
      </div>

      <!-- Mobile Hamburger -->
      <button
        type="button"
        class="md:hidden p-2 rounded-lg text-brown-light hover:text-brown hover:bg-sand transition-colors"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-menu"
        aria-label="Toggle navigation menu"
        (click)="toggleMenu()"
      >
        @if (isMenuOpen()) {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div id="mobile-menu" class="md:hidden bg-cream border-t border-sand px-4 py-4">
      <div class="flex flex-col gap-1">
        @for (link of navLinks; track link.sectionId) {
          <a
            [href]="'#' + link.sectionId"
            (click)="scrollTo(link.sectionId, $event)"
            class="text-brown-light hover:text-brown font-medium py-3 px-2 border-b border-sand last:border-0 transition-colors"
          >
            {{ link.label }}
          </a>
        }
        <a
          href="#inquiry"
          (click)="scrollTo('inquiry', $event)"
          class="mt-3 bg-brown text-cream px-4 py-3 rounded-full font-bold text-center hover:bg-brown-light transition-colors"
        >
          Place an Order
        </a>
      </div>
    </div>
  }
</nav>

<section
  id="hero"
  aria-label="Welcome to Kalli's Trinkets and More"
  class="relative min-h-screen flex flex-col items-center justify-center px-4 overflow-hidden"
  style="background-color: #F2E8DC; background-image: radial-gradient(#C8956C22 1px, transparent 1px); background-size: 26px 26px;"
>
  <!-- Decorative blobs -->
  <div class="absolute top-24 left-8 w-40 h-40 rounded-full blur-3xl pointer-events-none" style="background: #C8956C18;" aria-hidden="true"></div>
  <div class="absolute bottom-24 right-8 w-56 h-56 rounded-full blur-3xl pointer-events-none" style="background: #C8956C18;" aria-hidden="true"></div>
  <div class="absolute top-1/2 left-1/4 w-24 h-24 rounded-full blur-2xl pointer-events-none" style="background: #A6735520;" aria-hidden="true"></div>

  <!-- Main content -->
  <div class="relative z-10 text-center max-w-2xl mx-auto py-20">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img
        ngSrc="/assets/images/logo.png"
        width="374"
        height="274"
        alt="Kalli's Trinkets and More"
        priority
        class="object-contain drop-shadow-xl max-w-full rounded-3xl"
      />
    </div>

    <!-- Eyebrow badge -->
    <span class="inline-block bg-sand text-brown-light text-xs font-bold px-4 py-1.5 rounded-full mb-6 tracking-widest uppercase">
      Handcrafted with Love
    </span>

    <!-- Heading (visually hidden — the logo image displays the name) -->
    <h1 class="sr-only">Kalli's Trinkets &amp; More</h1>

    <!-- Subheading -->
    <p class="text-brown-light text-lg sm:text-xl leading-relaxed mb-10 max-w-lg mx-auto">
      Beautiful custom gifts made just for you — from engraved tumblers to 3D‑printed figurines, every piece is crafted with care and intention.
    </p>

    <!-- CTAs -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a
        href="#inquiry"
        (click)="scrollTo('inquiry', $event)"
        class="bg-brown text-cream px-8 py-4 rounded-full font-bold text-base hover:bg-brown-light transition-colors shadow-md w-full sm:w-auto text-center"
      >
        Place an Order
      </a>
      <a
        href="#our-story"
        (click)="scrollTo('our-story', $event)"
        class="border-2 border-brown text-brown px-8 py-4 rounded-full font-bold text-base hover:bg-sand transition-colors w-full sm:w-auto text-center"
      >
        Our Story
      </a>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1 text-brown-light" aria-hidden="true">
    <span class="text-xs font-semibold tracking-widest uppercase opacity-70">Scroll</span>
    <svg class="animate-bounce opacity-70" width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</section>
